version: '3.8'
services:
  mongo:
    image: mongo:latest
    container_name: mongo-dev
    restart: unless-stopped
    ports:
      - "${MONGO_PORT}:27017"  # Obscure high port for local MongoDB
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    build:
      context: .
      dockerfile: Dockerfile.mongo
    # No privileged mode, no host sockets mounted
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./.docker-volumes/:/data/db
      - ./.docker-volumes/init-user.js:/docker-entrypoint-initdb.d/init-user.js:ro
    # No extra capabilities granted
